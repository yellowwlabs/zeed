x-logging: &default-logging
  driver: "json-file"
  options:
    max-file: "5"
    max-size: "10m"


services:
  postgres-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: midnight_defi_angel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: MidnightDefiAngelPass2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubuddyadmin -d ubuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    driver: bridge